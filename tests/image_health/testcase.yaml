tests:
  # Twister test ID: image.health
  # type: unit  => runs on the 'unit_testing' platform (native-hosted, no kernel).
  # extra_args: M64_MODE=1 => compile as 64-bit (Zephyr's unittest.cmake defaults
  #   to -m32, which requires gcc-multilib; M64_MODE=1 switches to -m64).
  # CI invocation: west twister -p unit_testing -T tests/image_health -v
  image.health:
    type: unit
    extra_args: M64_MODE=1
    tags: ota uwb-266
