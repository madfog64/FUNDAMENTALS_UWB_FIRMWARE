# tests/twr_responder/prj.conf
# Minimal config for the unit_testing platform — only ztest is needed.
# CONFIG_UWB_TWR_RESP_REPLY_DELAY_DTU / CONFIG_UWB_TWR_RESPONDER_* values are
# injected as compile definitions in CMakeLists.txt (the unit_testing
# platform's Kconfig root does not include the drivers/dw1000/Kconfig
# hierarchy — same rationale as tests/dw1000_config/prj.conf).
CONFIG_ZTEST=y
