# UWB Tag Firmware — base project configuration
#
# Board-specific settings (e.g. UART baud rate, SPI frequency) go in the
# board overlay (boards/nrf52dk_nrf52832.overlay) or a board-specific
# .conf fragment, not here.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
# INFO level (3); bump to 4 (DBG) during development. Kconfig has no trailing
# inline comments — the whole RHS is parsed as the value.
CONFIG_LOG_DEFAULT_LEVEL=3

# RTT backend: view with J-Link RTT Viewer or `west debug --runner jlink`
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y

# UART backend: enabled via board default; view over USB-CDC on nrf52dk
CONFIG_LOG_BACKEND_UART=y

# Print the boot banner through the logging subsystem so it appears on all
# enabled backends.
CONFIG_BOOT_BANNER=y

# ---------------------------------------------------------------------------
# Console (UART, for shell / printk fallback)
# ---------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# ---------------------------------------------------------------------------
# DW1000 UWB transceiver driver (vendored Decawave API)
#
# CONFIG_DW1000=y automatically selects CONFIG_SPI and CONFIG_GPIO via Kconfig
# (see drivers/dw1000/Kconfig).  They are listed here explicitly for clarity.
#
# The Zephyr SPI + GPIO port layer (deca_port.c, UWB-93) implements the five
# deca_driver platform symbols; the __weak stubs (deca_port_stub.c, UWB-92)
# are overridden at link time.
# ---------------------------------------------------------------------------
CONFIG_DW1000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Work queue (system work queue) is enabled by default; listed here for
# documentation — the IRQ deferred-ISR path uses k_work_submit().
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
