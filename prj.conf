# UWB Tag Firmware — base project configuration
#
# Board-specific settings (e.g. UART baud rate, SPI frequency) go in the
# board overlay (boards/nrf52dk_nrf52832.overlay) or a board-specific
# .conf fragment, not here.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
# INFO level (3); bump to 4 (DBG) during development. Kconfig has no trailing
# inline comments — the whole RHS is parsed as the value.
CONFIG_LOG_DEFAULT_LEVEL=3

# RTT backend: view with J-Link RTT Viewer or `west debug --runner jlink`
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y

# UART backend: enabled via board default; view over USB-CDC on nrf52dk
CONFIG_LOG_BACKEND_UART=y

# Print the boot banner through the logging subsystem so it appears on all
# enabled backends.
CONFIG_BOOT_BANNER=y

# ---------------------------------------------------------------------------
# Console (UART, for shell / printk fallback)
# ---------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# ---------------------------------------------------------------------------
# DW1000 UWB transceiver driver (vendored Decawave API)
#
# CONFIG_DW1000=y automatically selects CONFIG_SPI and CONFIG_GPIO via Kconfig
# (see drivers/dw1000/Kconfig).  They are listed here explicitly for clarity.
#
# The Zephyr SPI + GPIO port layer (deca_port.c, UWB-93) implements the five
# deca_driver platform symbols; the __weak stubs (deca_port_stub.c, UWB-92)
# are overridden at link time.
# ---------------------------------------------------------------------------
CONFIG_DW1000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Work queue (system work queue) is enabled by default; listed here for
# documentation — the IRQ deferred-ISR path uses k_work_submit(). Bumped
# from 2048 to the value NCS's smp_svr sample uses (2304) now that MCUmgr
# command handlers (which run on this queue) are enabled below — some
# handlers (e.g. image upload) need more stack than the DW1000 IRQ path did.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2048

# ---------------------------------------------------------------------------
# BLE peripheral + SMP/MCUmgr DFU transport (ADR-0040, UWB-265)
#
# Builds on UWB-264's MCUboot + static partitions (sysbuild.conf,
# pm_static.yml). This adds the BLE GATT peripheral and the MCUmgr
# management server so an SMP client (mcumgr CLI / nRF Connect Device
# Manager) can upload a new signed image into the MCUboot secondary slot
# (mcuboot_secondary / slot1) over BLE. Mirrors NCS v2.7.0's in-tree
# reference sample (zephyr/samples/subsys/mgmt/mcumgr/smp_svr,
# prj.conf + overlay-bt.conf), trimmed to only the img_mgmt/os_mgmt groups
# and the BT transport this ticket scopes — no fs_mgmt/stat_mgmt/LittleFS,
# no shell transport (serial/USB SMP is out of scope, UWB-267).
#
# Out of scope here (see src/main.c and README "MCUboot & OTA" section):
# self-confirm / test-and-rollback / version-set logic is UWB-266.
# ---------------------------------------------------------------------------

# --- BLE peripheral --------------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Stable, connectable device name an SMP client scans for. Static across all
# tags (not per-device/per-DW1000-id) — matches ADR-0040 point 3 ("stable
# device name"); disambiguating multiple tags in range is left to the
# client's BLE address list, not the advertised name.
CONFIG_BT_DEVICE_NAME="UWB-Tag"

# Larger ATT MTU / ACL buffers and max-length data channel PDUs so an SMP
# image upload isn't bottlenecked by the default (~27 byte) BLE packet size.
# Values match NCS's smp_svr sample overlay-bt.conf.
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# --- MCUmgr / SMP core -------------------------------------------------------
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y

# Flash-map / stream-flash plumbing img_mgmt needs to write an uploaded image
# into the MCUboot secondary slot (mcuboot_secondary partition, pm_static.yml).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y

# --- MCUmgr management groups -----------------------------------------------
# img_mgmt: upload/list/test/confirm against the MCUboot secondary slot.
CONFIG_MCUMGR_GRP_IMG=y

# os_mgmt: echo/reset/taskstat (+ running image version, reported via
# img_mgmt's "image list", which reads it from the MCUboot image header).
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_TASKSTAT=y
CONFIG_THREAD_MONITOR=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y

# --- MCUmgr BLE transport ----------------------------------------------------
CONFIG_MCUMGR_TRANSPORT_BT=y

# No pairing/bonding infra exists on this bench-stage build (ADR-0040 point 6
# scopes secure-boot/production hardening to a later ADR); disable the
# authenticated-link requirement so an unpaired SMP client can reach the
# service. Revisit alongside production signing-key custody.
CONFIG_MCUMGR_TRANSPORT_BT_AUTHEN=n

# Request a short connection interval during SMP command exchange to speed
# up image upload throughput (recommended by Zephyr's MCUmgr docs when SMP
# is used for DFU).
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y

# Reassemble multi-fragment SMP packets so a full MTU-sized command doesn't
# have to fit in one BLE write; buffer sized for one SMP packet split across
# five BLE writes at the 498-byte MTU above (matches smp_svr sample).
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4608
