#
# Devicetree binding for the Decawave DW1000 UWB transceiver (SPI-attached).
#
# The DW1000 is a full-duplex SPI peripheral that operates in SPI mode 0
# (CPOL=0, CPHA=0) at up to 20 MHz (after initialisation; must be < 3 MHz
# during dwt_initialise).  The binding adds two GPIO properties on top of the
# standard spi-device base: an active-high IRQ line and an active-low (open-
# drain) RESET line.
#
# NCS version: v2.7.0 (Zephyr 3.6.x)

description: Decawave DW1000 UWB transceiver (SPI)

compatible: "decawave,dw1000"

include: spi-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true
    description: |
      GPIO connected to the DW1000 IRQ (EXTON) pin.
      The DW1000 asserts this pin high when an event requires host attention
      (frame received, transmission done, error, etc.).  Configure as
      active-high: <&gpioX n GPIO_ACTIVE_HIGH>.

  reset-gpios:
    type: phandle-array
    required: true
    description: |
      GPIO connected to the DW1000 RESET pin.
      The RESET pin is open-drain: the DW1000 drives it low during a
      power-on reset; the host drives it low to force a hardware reset.
      After reset the host must release the pin (configure as input) so the
      DW1000's internal pull-up can bring it high.
      Configure as active-low: <&gpioX n GPIO_ACTIVE_LOW>.
