# samples/dw1000_devid/prj.conf
# DW1000 device-ID read sample — project configuration

# ---------------------------------------------------------------------------
# DW1000 UWB transceiver driver
# ---------------------------------------------------------------------------
CONFIG_DW1000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_BOOT_BANNER=y

# ---------------------------------------------------------------------------
# Console
# ---------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
