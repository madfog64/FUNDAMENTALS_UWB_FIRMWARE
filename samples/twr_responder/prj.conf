# samples/twr_responder/prj.conf
# DS-TWR responder mode sample — project configuration

# ---------------------------------------------------------------------------
# DW1000 UWB transceiver driver
# ---------------------------------------------------------------------------
CONFIG_DW1000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Enable the optional local range estimate + log line for bring-up (see
# drivers/dw1000/Kconfig CONFIG_UWB_TWR_RESPONDER_DEBUG_RANGE help text).
# Debug-only; never reported off-device (ADR-011).
CONFIG_UWB_TWR_RESPONDER_DEBUG_RANGE=y

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_BOOT_BANNER=y

# ---------------------------------------------------------------------------
# Console
# ---------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
