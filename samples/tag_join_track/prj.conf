# samples/tag_join_track/prj.conf
# Join -> tracking sample — project configuration

# ---------------------------------------------------------------------------
# DW1000 UWB transceiver driver
# ---------------------------------------------------------------------------
CONFIG_DW1000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# ---------------------------------------------------------------------------
# Entropy / RNG — backs the join state machine's injected rng() callback
# (uwb_join_config_t::rng, ADR-0039 truncated-exponential backoff delay draw)
# via Zephyr's sys_rand_get()/sys_rand32_get() (<zephyr/random/random.h>).
# The nRF52832 has a hardware TRNG peripheral; CONFIG_ENTROPY_GENERATOR=y
# auto-selects CONFIG_ENTROPY_NRF5 for this board.
# ---------------------------------------------------------------------------
CONFIG_ENTROPY_GENERATOR=y

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_BOOT_BANNER=y

# ---------------------------------------------------------------------------
# Console
# ---------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
