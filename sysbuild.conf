# Sysbuild configuration — uwb_tag_firmware
#
# NCS sysbuild builds the application as one of possibly several images.
# Setting SB_CONFIG_BOOTLOADER_MCUBOOT=y adds a second image, "mcuboot"
# (built from the NCS-pinned bootloader/mcuboot tree fetched via west.yml),
# and reconfigures the main application image to build as a **signed,
# MCUboot-loadable** image (CONFIG_BOOTLOADER_MCUBOOT=y is injected into the
# app's own Kconfig automatically by sysbuild — no prj.conf change needed
# here). See ADR-0040 (docs/adr/0040-tag-ota-transport.md, FUNDAMENTALS_SPORTS
# repo) for the decision this implements: "MCUboot bootloader + application-
# managed firmware update over SMP/MCUmgr, carried on BLE" (the BLE/SMP
# transport itself is UWB-265; this ticket, UWB-264, only stands up the
# bootloader + partitions + signing).
#
# Flash partition layout is pinned statically in pm_static.yml (not the
# default dynamic Partition Manager layout) — see that file's header comment
# for the full 512 KB budget breakdown. A static layout is required per
# ADR-0040 point 1: "so the layout is stable across releases (a moving
# auto-layout would break the ability to update already-fielded tags)".

SB_CONFIG_BOOTLOADER_MCUBOOT=y

# ---------------------------------------------------------------------------
# Swap strategy — overwrite-only
#
# Per ADR-0040 point 2: "start with MCUboot overwrite-only (no scratch,
# smaller bootloader, simplest) unless dual-slot swap-with-test fits
# comfortably." On this board (nRF52832: 512 KB flash / 64 KB RAM), a
# swap-with-test layout needs a *third* scratch partition on top of
# mcuboot + slot0 + slot1 + settings, which would either shrink slot0/slot1
# below a workable app size or push mcuboot's own primary/secondary math
# into awkward, hard-to-grow fractions (see pm_static.yml comment for the
# arithmetic). Overwrite-only needs no scratch partition and a smaller
# MCUboot image (no swap state machine to link in), so it fits this budget
# comfortably where swap-with-test would not.
#
# Trade-off accepted: overwrite-only cannot swap a *bad-but-bootable* image
# back to the previous one — a rejected/unconfirmed image is simply not
# retried by MCUboot's swap logic the way swap-with-test's revert would be;
# recovery for a bad-but-bootable image is a fresh known-good upload.
#
# CORRECTION (UWB-266, verified against this NCS v2.7.0 checkout's
# bootloader/mcuboot/boot/bootutil/src/loader.c and bootutil_misc.c): an
# earlier version of this comment claimed "MCUboot's overwrite-only mode
# still reverts to the previous image on the next reset via its own
# boot-count/confirm bookkeeping in the image trailer." That is incorrect
# and is corrected here. In overwrite-only mode:
#   - boot_perform_update() unconditionally calls boot_copy_image(), which
#     erases the primary slot and copies the secondary slot's image over
#     it (loader.c) — there is no dual-image swap, so there is nothing left
#     to "revert" to once this has happened.
#   - The image_ok/copy_done trailer bookkeeping that swap-with-test modes
#     use to decide "boot once, then revert unless confirmed" is compiled
#     out entirely for overwrite-only builds (`#ifndef MCUBOOT_OVERWRITE_ONLY`
#     guards around that logic in bootutil_misc.c/loader.c).
# So: a non-self-confirming image still fails to boot the app (or is caught
# by the app's boot-time self-check, UWB-266, src/image_health.h, before it
# calls boot_write_img_confirmed()) — but MCUboot itself will NOT revert to
# the previous image on the next reset; there is no previous image left.
# The only recovery path for a bad-but-bootable image is uploading a fresh
# known-good image over BLE/SMP (UWB-265). See src/image_health.h and
# README.md "MCUboot & OTA" for how UWB-266's self-check gate is designed
# around this (it deliberately does not force a reboot on failure, since
# that cannot recover anything and would only bootloop). True atomic "swap
# back a running-but-misbehaving image" semantics remain the documented
# revisit trigger noted in ADR-0040 point 2.
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y

# ---------------------------------------------------------------------------
# Signing — development key (non-production)
#
# ADR-0040 point 6: "Use a development signing key committed for the build
# (documented as non-production)." See keys/mcuboot_dev_key.pem for the key
# itself and its header comment (generation command + production-rotation
# checklist). ECDSA P-256 is the modern NCS/MCUboot default signature
# scheme (smaller signatures and keys than RSA-2048, sufficient security
# margin for a dev/bench key).
#
# SB_CONFIG_BOOT_SIGNATURE_KEY_FILE must be an *absolute* path: sysbuild
# resolves a relative value independently for each image (the app image
# resolves it against the west workspace topdir in
# nrf/cmake/sysbuild/image_signing.cmake; the mcuboot image resolves it
# against its own module dir in nrf/modules/mcuboot/CMakeLists.txt), so a
# relative path can silently point at two different (and both wrong)
# locations depending on how the workspace was `west init`'d. Anchor it to
# this application's own directory with the sysbuild-provided
# ${APPLICATION_CONFIG_DIR} CMake variable (defaults to this app's absolute
# source dir; expanded via `string(CONFIGURE)` into every image's merged
# Kconfig, so both images resolve the exact same file regardless of
# workspace layout). The leading backslash (\${...}) is required: it
# escapes the substitution through an earlier, unrelated
# `string(CONFIGURE)` pass so it survives to expand at the right stage —
# this exact escaped form is what NCS's own nrf_desktop sample configs
# commit for SB_CONFIG_BOOT_SIGNATURE_KEY_FILE (see e.g.
# nrf/applications/nrf_desktop/configuration/*/sysbuild.conf in the NCS
# tree); see also
# doc/nrf/config_and_build/bootloaders/bootloader_adding_sysbuild.rst.
SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="\${APPLICATION_CONFIG_DIR}/keys/mcuboot_dev_key.pem"
