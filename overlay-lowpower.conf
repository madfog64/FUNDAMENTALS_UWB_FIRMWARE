# Low-power tag profile overlay (ADR-0046, UWB-314)
#
# Layered on top of prj.conf by CMakeLists.txt (EXTRA_CONF_FILE) only when
# CONFIG_UWB_TAG_LOW_POWER=y is passed on the west build command line, e.g.:
#
#   west build -b nrf52dk_nrf52832 . --sysbuild -- -DCONFIG_UWB_TAG_LOW_POWER=y
#
# Why a .conf fragment and not a Kconfig `default`/`select` block in the
# app's root Kconfig: several of the symbols below are given real (i.e. not
# `default`) values by the board's own
# $ZEPHYR_BASE/boards/nordic/nrf52dk/nrf52dk_nrf52832_defconfig
# (CONFIG_SERIAL=y, CONFIG_USE_SEGGER_RTT=y, CONFIG_UART_CONSOLE=y). Per
# standard Kconfig semantics, an assigned value always outranks a `default`
# clause regardless of the default's condition or where it is sourced from
# — verified empirically against this repo's pinned NCS v2.7.0 tree while
# implementing this ticket. A later-merged .conf fragment is the documented,
# reliable way to override a board-level assignment; EXTRA_CONF_FILE entries
# are merged after prj.conf (and after the board defconfig), so plain `=`
# assignments here win.
#
# CONFIG_PM (system-level power-state residency policy) is intentionally
# NOT set here — see the CONFIG_UWB_TAG_LOW_POWER help text in the app's
# Kconfig for why it is unavailable on nrf52dk_nrf52832 with this pinned
# Zephyr/NCS version (no Nordic SoC selects HAS_PM in that tree).

# ---------------------------------------------------------------------------
# Zephyr PM baseline (ADR-0046 point 1)
# ---------------------------------------------------------------------------

# Device-level power management hooks (suspend/resume) — the seam the
# DW1000 sleep/wake driver (UWB-316) hangs off. Does not depend on HAS_PM.
CONFIG_PM_DEVICE=y

# ---------------------------------------------------------------------------
# Logging — drop the backends that hold the CPU/peripherals awake
# (RTT needs the debugger link powered + polls a RAM ring buffer; the UART
# backend keeps the UART peripheral clocked) and lower the default level so
# fewer messages are formatted/queued in the first place.
# ---------------------------------------------------------------------------
CONFIG_LOG_BACKEND_RTT=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_UART=n

# ERROR only (1) — see subsys/logging/Kconfig.filtering for the level table
# (0 OFF / 1 ERR / 2 WRN / 3 INF / 4 DBG). CONFIG_LOG itself stays enabled
# (prj.conf) so log call sites still compile; with no backend registered
# there is nowhere for them to go, but keeping the subsystem on (rather than
# CONFIG_LOG=n) means a future backend (e.g. a battery-backed flash log) can
# be added under this profile without touching every LOG_* call site.
CONFIG_LOG_DEFAULT_LEVEL=1

# ---------------------------------------------------------------------------
# UART console — nothing in this profile's scope needs it: no shell
# transport is enabled (serial/USB SMP is explicitly out of scope, see
# README "BLE / SMP-MCUmgr DFU transport"), and BLE/SMP-over-BLE (UWB-265)
# does not use it. Disabling CONFIG_SERIAL powers down the UART peripheral
# entirely on this profile; CONFIG_UART_CONSOLE and CONFIG_LOG_BACKEND_UART
# above both `depends on` it (directly or transitively) so this is also
# belt-and-braces for that chain.
# ---------------------------------------------------------------------------
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
