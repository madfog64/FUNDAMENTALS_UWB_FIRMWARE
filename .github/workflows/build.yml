# Firmware Build CI
#
# Two jobs:
#
#   west-build  — cross-compiles for nrf52dk_nrf52832 (arm-zephyr-eabi).
#                 Fails on any compile or link error.
#
#   twister     — runs host-side ztests on the 'unit_testing' platform.
#                 Scans all tests/ subdirectories (UWB-94: devid suite;
#                 UWB-155: PHY config suite).
#                 Fails if any test assertion fails (non-zero twister exit).
#
# Both jobs use the same zephyrproject-rtos/action-zephyr-setup action,
# which installs west, fetches NCS v2.7.0, auto-detects the Zephyr SDK
# (0.16.5-1), downloads the arm-zephyr-eabi cross-compiler, installs NCS
# Python requirements, and enables ccache.
#
# Why not the ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.7.0 container?
# GitHub Actions bypasses that image's entrypoint when executing each step
# script, so the pre-installed toolchain bundle never lands on PATH.
# nrfutil-toolchain-manager (the mechanism to activate it) is a local
# dev-box install, not present in the image itself.  A plain ubuntu runner +
# this action is the conventional, supported NCS/Zephyr CI pattern.
#
# Workspace layout (GITHUB_WORKSPACE):
#   uwb_tag_firmware/     <- this repo, checked out by actions/checkout
#   .west/                <- created by the action (west init -l uwb_tag_firmware)
#   nrf/                  <- NCS SDK           \
#   zephyr/               <- Zephyr RTOS        > fetched by west update
#   modules/              <- Zephyr modules     |
#   bootloader/           <- MCUboot etc.      /
#
# Triggers: pull_request (any branch) and push to main.

name: Firmware Build CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same ref to save Actions minutes.
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  west-build:
    name: west build (nrf52dk_nrf52832 / NCS v2.7.0)
    runs-on: ubuntu-22.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout this repo into a named subdirectory so west init -l can
      #    treat the GITHUB_WORKSPACE root as the west workspace root.
      # -----------------------------------------------------------------------
      - name: Checkout firmware source
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938  # v4.2.0
        with:
          path: uwb_tag_firmware

      # -----------------------------------------------------------------------
      # 2. Set up the west workspace and Zephyr SDK.
      #    This action:
      #      - installs west (pip) and apt build deps (ccache, gperf, etc.)
      #      - runs: west init -l uwb_tag_firmware && west update -o=--depth=1
      #      - auto-detects SDK version from zephyr/SDK_VERSION (-> 0.16.5-1)
      #      - downloads the matching Zephyr SDK minimal bundle and registers
      #        the arm-zephyr-eabi cross-compiler
      #      - installs NCS Python requirements (west packages pip / requirements.txt)
      #      - enables ccache (caches compiled objects between runs)
      #    The Zephyr SDK binary and ccache are restored/saved automatically.
      #    NCS source clones (nrf, zephyr, modules, bootloader) are re-fetched
      #    shallow (--depth=1) on a cold run; warm runs benefit from ccache.
      # -----------------------------------------------------------------------
      - name: Set up Zephyr project (west + NCS + Zephyr SDK)
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28  # v1.0.14
        with:
          app-path: uwb_tag_firmware
          toolchains: arm-zephyr-eabi

      # -----------------------------------------------------------------------
      # 3. Build.  Fails the job on any compile or link error.
      #    Build artefacts land in GITHUB_WORKSPACE/build/.
      # -----------------------------------------------------------------------
      - name: Build firmware
        run: west build -b nrf52dk_nrf52832 uwb_tag_firmware

  # ---------------------------------------------------------------------------
  # Job: twister — host-side ztest execution (unit_testing platform)
  #
  # Scans all subdirectories under tests/ for testcase.yaml files and runs
  # them as native Linux executables on the 'unit_testing' platform.
  #
  # Current suites (alphabetical):
  #   tests/dw1000_config/  — dw1000.config (UWB-155)
  #     Mocks dwt_initialise/dwt_configure/dwt_configuretxrf at function level
  #     to verify the PHY config values match contracts/uwb/phy_config.h v0.6.
  #   tests/dw1000_devid/   — dw1000.devid  (UWB-94)
  #     Mocked readfromspi() returns DEV_ID bytes; asserts SPI header framing
  #     and decoded value 0xDECA0130.
  #   tests/dw1000_ranging/ — dw1000.ranging (UWB-231)
  #     Mocks the RX/TX register + timestamp API; asserts dw1000_rx()'s
  #     good-frame/error/timeout handling, dw1000_tx_at()'s delayed-time
  #     programming and HPDWARN error path, and dw1000_delayed_tx_time()'s
  #     low-9-bit truncation.
  #   tests/dw1000_sync/    — dw1000.sync (UWB-242)
  #     Reuses the dw1000_ranging mock; asserts dw1000_sync_rx()'s SYNC-frame
  #     validation (frame type / PAN ID / destination / length) over the
  #     mocked dw1000_rx(), the -ETIMEDOUT/-EIO passthrough paths, and
  #     uwb_sync_parse()'s radio-free golden-value LE decode.
  #   tests/uwb_cycle_ref/  — uwb.cycle_ref (UWB-243)
  #     Pure logic, no deca_driver: asserts init/get, on_sync acquisition and
  #     latest-edge tracking, on_miss tolerance + invalidation at
  #     CONFIG_UWB_SYNC_MAX_MISSED, re-acquisition after invalidation, and
  #     the cycle_seq discontinuity (still-accepted) / 16-bit wrap paths.
  #
  # The 'unit_testing' platform has no Zephyr kernel — it links only the
  # ztest framework and the sources listed in each test's CMakeLists.txt.
  # twister exits non-zero if any test assertion fails → CI step fails.
  # ---------------------------------------------------------------------------
  twister:
    name: west twister (unit_testing / all suites)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout firmware source
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938  # v4.2.0
        with:
          path: uwb_tag_firmware

      - name: Set up Zephyr project (west + NCS + Zephyr SDK)
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28  # v1.0.14
        with:
          app-path: uwb_tag_firmware
          # unit_testing uses the host GCC (/usr/bin/gcc), not a Zephyr SDK
          # cross-compiler.  We still download arm-zephyr-eabi so the action
          # registers the Zephyr SDK (needed by west twister for CMake modules).
          # On warm runs this hits the GitHub cache from the west-build job.
          toolchains: arm-zephyr-eabi

      # -----------------------------------------------------------------------
      # Install twister's Python dependencies.
      # The action already installs west's own requirements; these extras cover
      # pyelftools (ELF parsing) and anytree (test-suite tree building) that
      # twister uses when parsing results.
      # -----------------------------------------------------------------------
      - name: Install twister Python dependencies
        run: pip install pyelftools anytree

      # -----------------------------------------------------------------------
      # Run twister on all test suites under tests/.
      #
      # Flags:
      #   -p unit_testing    — target platform (native host, no emulation)
      #   -T <dir>           — root directory to scan for testcase.yaml files
      #   -v                 — verbose output (test names + PASS/FAIL per case)
      #   --no-clean         — keep twister-out/ for potential artifact upload
      #
      # Exit code: non-zero if any test fails → CI step fails → PR goes red.
      # -----------------------------------------------------------------------
      - name: Run all ztests (twister)
        run: >
          west twister
          -p unit_testing
          -T uwb_tag_firmware/tests
          -v
          --no-clean

      # Upload twister results for diagnosis even on failure.
      - name: Upload twister results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-results
          path: twister-out/
